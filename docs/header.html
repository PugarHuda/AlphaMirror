<style>
@page { size: A4; margin: 2cm 2cm 2.2cm 2cm; }
html { font-size: 11pt; }
body {
  font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  color: #1a1a1a; line-height: 1.55; max-width: 100%; margin: 0; padding: 0;
}
h1, h2, h3, h4 { font-weight: 600; color: #0b1220; page-break-after: avoid; }
h1 { font-size: 22pt; margin-top: 2.5em; padding-bottom: 0.4em; border-bottom: 2px solid #0b1220; page-break-before: always; }
h1:first-of-type { margin-top: 0.2em; page-break-before: avoid; }
h2 { font-size: 15pt; margin-top: 1.8em; padding-bottom: 0.25em; border-bottom: 1px solid #d0d7de; }
h3 { font-size: 12.5pt; margin-top: 1.4em; color: #334155; }
h4 { font-size: 11.5pt; color: #475569; }
p { margin: 0.6em 0; text-align: justify; }
ul, ol { margin: 0.5em 0 0.8em 1.3em; padding: 0; }
li { margin: 0.25em 0; }
a { color: #1e40af; text-decoration: none; }
code {
  font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
  font-size: 0.92em; background: #f1f5f9; padding: 1px 5px;
  border-radius: 3px; color: #0b1220;
}
pre {
  background: #0f172a; color: #e2e8f0; padding: 10px 14px;
  border-radius: 6px; overflow-x: auto; font-size: 9.5pt;
  line-height: 1.4; page-break-inside: avoid; margin: 0.8em 0;
}
pre code { background: transparent; color: inherit; padding: 0; }
table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 9.8pt; page-break-inside: avoid; }
th { background: #0f172a; color: white; padding: 8px 10px; text-align: left; font-weight: 600; font-size: 9.5pt; }
td { padding: 7px 10px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
tr:nth-child(even) td { background: #f8fafc; }
blockquote {
  border-left: 4px solid #1e40af; background: #eff6ff;
  padding: 0.7em 1.1em; margin: 1em 0; color: #1e3a8a; font-style: italic;
}
blockquote p { margin: 0.25em 0; }
header#title-block-header {
  text-align: center; margin-bottom: 3em; padding-bottom: 1.5em;
  border-bottom: 3px double #0b1220; page-break-after: always;
}
header#title-block-header h1.title {
  font-size: 28pt; border: none; padding: 0; margin-bottom: 0.3em; page-break-before: avoid;
}
header#title-block-header p.subtitle { font-size: 14pt; color: #475569; font-style: italic; margin: 0.5em 0; }
header#title-block-header p.author, header#title-block-header p.date { font-size: 11pt; color: #64748b; margin: 0.25em 0; }
#TOC, nav#TOC {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 1em 1.5em; margin: 1.5em 0; page-break-after: always;
}
#TOC ul, nav#TOC ul { list-style: none; margin-left: 0; padding-left: 1em; }
#TOC > ul, nav#TOC > ul { padding-left: 0; }
#TOC a, nav#TOC a { color: #334155; text-decoration: none; }
hr { border: none; border-top: 1px solid #cbd5e1; margin: 2em 0; }
</style>
